```html
<!DOCTYPE html>
<html>

<head>

    <title>Flipkart Chatbot</title>

    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <link rel="stylesheet"
        type="text/css"
        href="{{ url_for('static', filename='style.css')}}"/>

</head>

<body>

    <div class="container-fluid h-100">

        <div class="row justify-content-center h-100">

            <div class="col-md-8 col-xl-6 chat">

                <div class="card">

                    <!-- HEADER -->
                    <div class="card-header msg_head">

                        <div class="d-flex bd-highlight">

                            <div class="img_cont">

                                <img src="https://static.vecteezy.com/system/resources/previews/016/017/018/non_2x/ecommerce-icon-free-png.png"
                                    class="rounded-circle user_img">

                                <span class="online_icon"></span>

                            </div>

                            <div class="user_info">

                                <span>Flipkart AI Assistant</span>

                                <p>Ask me about products, reviews & recommendations</p>

                            </div>

                        </div>

                    </div>

                    <!-- CHAT BODY -->
                    <div id="messageFormeight"
                        class="card-body msg_card_body">

                    </div>

                    <!-- FOOTER -->
                    <div class="card-footer">

                        <form id="messageArea"
                            class="input-group">

                            <input type="text"
                                id="text"
                                name="msg"
                                placeholder="Ask about products..."
                                autocomplete="off"
                                class="form-control type_msg"
                                required />

                            <div class="input-group-append">

                                <button type="submit"
                                    id="send"
                                    class="input-group-text send_btn">

                                    <i class="fas fa-paper-plane"></i>

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        $(document).ready(function () {

            $("#messageArea").on("submit", function (event) {

                event.preventDefault();

                const date = new Date();

                const hour = date.getHours();

                const minute = date.getMinutes();

                const str_time = hour + ":" + minute;

                var rawText = $("#text").val();

                // USER MESSAGE
                var userHtml = `

                <div class="d-flex justify-content-end mb-3">

                    <div class="msg_cotainer_send">

                        ${rawText}

                        <span class="msg_time_send">
                            ${str_time}
                        </span>

                    </div>

                    <div class="img_cont_msg">

                        <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png"
                            class="rounded-circle user_img_msg">

                    </div>

                </div>
                `;

                $("#text").val("");

                $("#messageFormeight").append(userHtml);

                // AUTO SCROLL
                $("#messageFormeight").scrollTop(
                    $("#messageFormeight")[0].scrollHeight
                );

                // API CALL
                $.ajax({

                    data: {
                        msg: rawText,
                    },

                    type: "POST",

                    url: "/get",

                }).done(function (data) {

                    // FORMAT RESPONSE
                    data = data

                        // REMOVE EXTRA EMPTY LINES
                        .replace(/\n\s*\n/g, "\n")

                        // CONVERT NEWLINES TO BR
                        .replace(/\n/g, "<br>")

                        // BOLD SUPPORT
                        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")

                        // PRODUCT BLOCK
                        .replace(/🎧/g, "<div class='product-block'>🎧 ")

                        // STAR SECTION
                        .replace(/⭐/g, "<br><span class='star-section'>⭐ ")

                        // MONEY SECTION
                        .replace(/💰/g, "</span><br><span class='money-section'>💰 ")

                        // HORIZONTAL LINE
                        .replace(/--------------------------------------------------/g, "<hr>")

                        // CLOSE PRODUCT BLOCK
                        + "</span></div>";

                    // BOT MESSAGE
                    var botHtml = `

                    <div class="d-flex justify-content-start mb-3">

                        <div class="img_cont_msg">

                            <img src="https://static.vecteezy.com/system/resources/previews/016/017/018/non_2x/ecommerce-icon-free-png.png"
                                class="rounded-circle user_img_msg">

                        </div>

                        <div class="msg_cotainer">

                            ${data}

                            <span class="msg_time">
                                ${str_time}
                            </span>

                        </div>

                    </div>
                    `;

                    $("#messageFormeight").append(botHtml);

                    // AUTO SCROLL
                    $("#messageFormeight").scrollTop(
                        $("#messageFormeight")[0].scrollHeight
                    );

                });

            });

        });

    </script>

</body>

</html>
```
